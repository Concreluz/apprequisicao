<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="imagens/flavicon.png" type="image/png">
    <title>Solicitação de Compras</title>
    <style>
        /* Tipografia Apple e Fundo com Gradiente Suave Concreluz */
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #d1d1d1; 
            background-image: 
                url("imagens/LogoConcreluz.jpeg"),
                radial-gradient(circle at 10% 10%, rgba(230, 92, 0, 0.432), transparent 40%),
                radial-gradient(ellipse at 50% 50%, rgba(240, 88, 0, 0.452), transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(0, 0, 0, 0.452), transparent 40%);
            background-size: 190px auto, auto, auto, auto;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-position:bottom;
            margin: 0;
            padding-bottom: 35px;
            padding-top: 15px;
            color: #1d1d1f;
            min-height: 100vh;
        }

        /* Container Principal */
        .container { 
            max-width: 850px; 
            margin: 0 auto; 
            background: rgba(151, 151, 151, 0.507); 
            backdrop-filter: blur(24px) saturate(180%); 
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            padding: 35px; 
            border-radius: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 40px rgba(0,0,0,0.06); 
        }
        
        h2 { font-weight: 700; letter-spacing: -0.5px; margin-top: 0; margin-bottom: 25px; }

        /* Navbar */
        .navbar { display: flex; gap: 10px; margin-bottom: 30px; background: rgba(29, 29, 31, 0.06); padding: 6px; border-radius: 16px; border: 1px solid rgba(255, 255, 255, 0.4); }
        .nav-btn { flex: 1; background: transparent; color: #1d1d1f; border: none; padding: 10px 15px; cursor: pointer; font-size: 15px; font-weight: 600; border-radius: 12px; transition: all 0.3s ease; }
        .nav-btn:hover { background: rgba(255, 255, 255, 0.5); }
        .nav-btn.active { background: #e65c00; color: white; box-shadow: 0 4px 12px rgba(230, 92, 0, 0.3); }

        .escondido { display: none !important; }

        /* Formulários */
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #1d1d1f; font-size: 14px; }
        input, select, textarea { width: 100%; padding: 12px 14px; background: rgba(255, 255, 255, 0.7); border: 1px solid rgba(255, 255, 255, 0.9); border-radius: 14px; font-size: 15px; color: #1d1d1f; transition: all 0.3s ease; font-family: inherit; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #e65c00; background: #ffffff; box-shadow: 0 0 0 4px rgba(230, 92, 0, 0.15); }

        /* Botões */
        .btn { padding: 14px 20px; background: #e65c00; color: white; border: none; border-radius: 14px; cursor: pointer; font-weight: 600; font-size: 16px; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(230, 92, 0, 0.25); }
        .btn:hover { background: #cc5200; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(230, 92, 0, 0.35); }
        .btn-remover { background: rgba(220, 53, 69, 0.1); color: #dc3545; border: none; padding: 6px 12px; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 700; transition: 0.2s; }
        .btn-remover:hover { background: #dc3545; color: white; }
        .btn-anexo { display: inline-block; background: rgba(0, 89, 179, 0.164); color: #004da0; text-decoration: none; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.171); padding: 6px 12px; border-radius: 10px; font-size: 13px; font-weight: 600; margin-left: 10px; transition: 0.2s; }
        .btn-anexo:hover { background: #007bff9d; box-shadow: 0 10px 25px rgba(255, 255, 255, 0.61); color: white; }

        /* Form Itens */
        .items-container { background: rgba(255, 255, 255, 0.4); border: 1px solid rgba(255, 255, 255, 0.6); padding: 18px; border-radius: 16px; }
        .item-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .item-list { margin-top: 10px; list-style: none; padding: 0; }
        .item-list li { background: rgba(255, 255, 255, 0.65); padding: 12px 16px; border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        
        /* Grid de Cards (Histórico Expansível) */
        .cards-grid { display: grid; grid-template-columns: 1fr; gap: 18px; margin-top: 15px; }
        .card { background: rgba(255, 255, 255, 0.103); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 20px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); transition: transform 0.3s ease, box-shadow 0.3s ease; overflow: hidden; }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(255, 255, 255, 0.5); }
        
        /* Área Clicável do Card */
        .card-header { padding: 22px; cursor: pointer; }
        .card-header h4 { margin: 0 0 10px 0; color: #1d1d1f; font-size: 17px; display: flex; justify-content: space-between; align-items: center;}
        .card-header .status-line { font-size: 14px; color: #444; margin-bottom: 15px; font-weight: 600; display: flex; align-items: center; gap: 5px; }
        .card-header .footer-line { font-size: 13px; color: #1d1d1f; display: flex; justify-content: space-between; align-items: center; font-weight: 500;}
        
        .chevron { transition: transform 0.3s ease; font-size: 14px; color: #888; }
        
        /* Área Oculta dos Itens (Expansão) */
        .card-body { display: none; padding: 0 22px 22px 22px; background: rgba(255, 255, 255, 0.164); border-top: 1px solid rgba(255, 255, 255, 0.6); }
        .tabela-itens { margin-top: 15px; display: flex; flex-direction: column; gap: 8px; }
        .linha-item { background: rgba(255, 255, 255, 0.281); padding: 12px; border-radius: 12px; display: grid; grid-template-columns: 2fr 1fr 2fr 1.5fr 1fr; gap: 10px; align-items: center; font-size: 14px; border: 1px solid rgba(255,255,255,0.9); box-shadow: 0 2px 5px rgba(0,0,0,0.02);}
        .linha-item-header { background: transparent; padding: 0 12px; display: grid; grid-template-columns: 2fr 1fr 2fr 1.5fr 1fr; gap: 10px; font-size: 12px; font-weight: bold; color: #555; text-transform: uppercase; margin-bottom: 4px; }
        
        .badge-status { background: rgba(230, 92, 0, 0.15); color: #cc5200; padding: 4px 8px; border-radius: 6px; font-weight: bold; font-size: 12px; text-align: center; }

        /* --- CORES DOS STATUS (Padrão Google Sheets) --- */
        .status-pendente { background-color: #fce5cd !important; color: #b45f06 !important; }
        .status-aguardando { background-color: #ebebeb !important; color: #333333 !important; }
        .status-cotacao { background-color: #d9ead3 !important; color: #38761d !important; }
        .status-pedido { background-color: #0b5394 !important; color: white !important; }
        .status-entregue { background-color: #12753a !important; color: white !important; }
        .status-cancelado { background-color: #b30000 !important; color: white !important; }
        .status-padrao { background-color: rgba(230, 92, 0, 0.15); color: #cc5200; }

        /* --- BOTÃO FLUTUANTE DE AJUDA (WhatsApp) --- */
        .btn-ajuda-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #e65c00;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 9999;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .btn-ajuda-float:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(255, 255, 255, 0.3);
        }
        .btn-ajuda-float svg {
            width: 35px;
            height: 35px;
            fill: white;
        }

        @media (max-width: 768px) {
            .linha-item, .linha-item-header { grid-template-columns: 1fr; gap: 5px; }
            .linha-item-header { display: none; } /* Oculta cabeçalho em telas pequenas */
            .linha-item { padding: 15px; }
            .linha-item div::before { content: attr(data-label) ": "; font-weight: bold; color: #555; }
        }

        #loading { display: none; margin-top: 15px; color: #e65c00; font-weight: 600; text-align: center; }
        .search-bar { display: flex; gap: 12px; margin-bottom: 25px; }
        @media (max-width: 600px) { .search-bar { flex-direction: column; } }
    </style>
</head>

<script>
    const URL_DO_GAS = "https://script.google.com/macros/s/AKfycbxmWpN2H-AqTxvMVoHiRoaceScMdDqg7KgSvcrS4vjhnZOp2owwU09MC0Om8dSCTKsx/exec"; 

    let todasRequisicoes = []; 
    let tempoUltimaBusca = 0; 
    let itensMapeados = [];
    let arquivosSelecionados = []; // Nova memória para os anexos múltiplos

    // --- NAVEGAÇÃO ---
    function mostrarTela(telaAlvo) {
        document.getElementById('telaNova').classList.add('escondido');
        document.getElementById('telaLista').classList.add('escondido');
        document.getElementById('btnAbaNova').classList.remove('active');
        document.getElementById('btnAbaLista').classList.remove('active');

        if(telaAlvo === 'nova') {
            document.getElementById('telaNova').classList.remove('escondido');
            document.getElementById('btnAbaNova').classList.add('active');
        } else if (telaAlvo === 'lista') {
            document.getElementById('telaLista').classList.remove('escondido');
            document.getElementById('btnAbaLista').classList.add('active');
            carregarDados(); 
        }
    }

    // --- ANIMAÇÃO DE EXPANSÃO DOS CARDS ---
    function toggleCard(id) {
        const body = document.getElementById(`body-${id}`);
        const chev = document.getElementById(`chev-${id}`);
        if (body.style.display === 'none' || body.style.display === '') {
            body.style.display = 'block';
            chev.style.transform = 'rotate(180deg)';
        } else {
            body.style.display = 'none';
            chev.style.transform = 'rotate(0deg)';
        }
    }

    // --- GESTÃO DE ITENS ---
    function adicionarItem() {
        const nome = document.getElementById('nomeItem').value;
        const qtd = document.getElementById('qtdItem').value;
        if(nome && qtd) {
            itensMapeados.push({nome: nome, qtd: qtd});
            atualizarListaHTML();
            document.getElementById('nomeItem').value = '';
            document.getElementById('qtdItem').value = '';
            document.getElementById('nomeItem').focus();
        }
    }

    function removerItem(index) {
        itensMapeados.splice(index, 1);
        atualizarListaHTML();
    }

    function atualizarListaHTML() {
        const ul = document.getElementById('listaItensHTML');
        ul.innerHTML = '';
        itensMapeados.forEach((item, index) => {
            ul.innerHTML += `<li><span>${item.nome} <b>(${item.qtd})</b></span><button type="button" class="btn-remover" onclick="removerItem(${index})">X</button></li>`;
        });
    }

    // --- GESTÃO VISUAL DE MÚLTIPLOS ANEXOS ---
    document.getElementById('btnAdicionarAnexo').addEventListener('click', () => {
        document.getElementById('arquivoAnexo').click();
    });

    document.getElementById('arquivoAnexo').addEventListener('change', function(e) {
        const files = e.target.files;
        for (let i = 0; i < files.length; i++) {
            arquivosSelecionados.push(files[i]);
        }
        atualizarListaAnexos();
        this.value = ''; // Limpa o input escondido
    });

    function removerAnexo(index) {
        arquivosSelecionados.splice(index, 1);
        atualizarListaAnexos();
    }

    function atualizarListaAnexos() {
        const ul = document.getElementById('listaAnexosHTML');
        ul.innerHTML = '';
        arquivosSelecionados.forEach((file, index) => {
            const tamanhoMB = (file.size / (1024 * 1024)).toFixed(2);
            ul.innerHTML += `
                <li>
                    <span>📄 ${file.name} <b>(${tamanhoMB} MB)</b></span>
                    <button type="button" class="btn-remover" onclick="removerAnexo(${index})" title="Remover anexo">X</button>
                </li>`;
        });
    }

    // --- BLOQUEIO DO ENTER ---
    document.getElementById('requisicaoForm').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
            e.preventDefault(); 
            if (e.target.id === 'nomeItem' || e.target.id === 'qtdItem') adicionarItem();
        }
    });

    // --- ENVIO DO FORMULÁRIO ---
    document.getElementById('requisicaoForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        if(itensMapeados.length === 0) { alert('Adicione pelo menos um item!'); return; }
        if (!confirm("Confirma o envio desta requisição?")) return;

        document.getElementById('btnEnviar').style.display = 'none';
        document.getElementById('loading').style.display = 'block';

        const payload = {
            unidade: document.getElementById('unidade').value,
            solicitante: document.getElementById('solicitante').value,
            tipo: document.getElementById('tipo').value,
            grupoMaterial: document.getElementById('grupoMaterial').value,
            itens: itensMapeados,
            prazo: document.getElementById('prazo').value,
            aplicacao: document.getElementById('aplicacao').value,
            justificativa: document.getElementById('justificativa').value,
            urgente: document.getElementById('urgente').value,
            arquivos: [] // Array para os ficheiros
        };

        if (arquivosSelecionados.length > 0) {
            let tamanhoTotal = 0;
            
            for(let i = 0; i < arquivosSelecionados.length; i++) {
                tamanhoTotal += arquivosSelecionados[i].size;
            }
            
            if (tamanhoTotal > 10 * 1024 * 1024) {
                alert("O tamanho total dos anexos excede 10MB. Por favor, remova ou comprima alguns ficheiros.");
                document.getElementById('btnEnviar').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
                return;
            }

            const promessasFicheiros = arquivosSelecionados.map(file => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.onload = function(evento) {
                        resolve({
                            nome: file.name,
                            mimeType: file.type,
                            base64: evento.target.result.split(',')[1]
                        });
                    };
                    reader.readAsDataURL(file);
                });
            });

            Promise.all(promessasFicheiros).then(arquivosProcessados => {
                payload.arquivos = arquivosProcessados;
                enviarParaGAS(payload);
            });
            
        } else {
            enviarParaGAS(payload);
        }
    });

    // --- COMUNICAÇÃO COM O GOOGLE APPS SCRIPT ---
    async function enviarParaGAS(payload) {
        try {
            const response = await fetch(URL_DO_GAS, { method: 'POST', body: JSON.stringify(payload) });
            const result = await response.json();
            
            if(result.status === "success") {
                alert(`Requisição enviada com sucesso!`);
                document.getElementById('requisicaoForm').reset();
                
                // Limpa todas as memórias após o sucesso
                itensMapeados = []; 
                arquivosSelecionados = []; 
                atualizarListaHTML();
                atualizarListaAnexos(); 
                
                await carregarDados(true); 
                mostrarTela('lista'); 
            } else { alert(`Erro no servidor: ${result.message}`); }
        } catch (error) { alert("Erro de conexão."); } 
        finally { document.getElementById('btnEnviar').style.display = 'block'; document.getElementById('loading').style.display = 'none'; }
    }

    // --- HELPERS E FORMATAÇÃO ---
    function formatarDataBR(dataStr) {
        if (!dataStr) return '--/--/----';
        let limpo = String(dataStr).split('T')[0]; 
        if (limpo.includes('-')) {
            let partes = limpo.split('-');
            if (partes.length === 3) return `${partes[2]}/${partes[1]}/${partes[0]}`;
        }
        return limpo; 
    }

    // --- CARREGAMENTO DE DADOS (CACHE 30S E EAGER LOADING) ---
    async function carregarDados(forcarUpdate = false) {
        const agora = Date.now();
        if (!forcarUpdate && todasRequisicoes.length > 0 && (agora - tempoUltimaBusca < 30000)) {
            renderizarCards(todasRequisicoes); return;
        }
        try {
            document.getElementById('cardsContainer').innerHTML = 'Carregando solicitações...';
            const response = await fetch(URL_DO_GAS);
            const dados = await response.json(); 
            
            const datalist = document.getElementById('historicoItens');
            datalist.innerHTML = '';
            dados.itensHistorico.forEach(item => { datalist.appendChild(new Option(item, item)); });

            todasRequisicoes = dados.requisicoes.reverse();
            tempoUltimaBusca = Date.now();
            renderizarCards(todasRequisicoes);
        } catch (error) { document.getElementById('cardsContainer').innerHTML = 'Falha ao carregar.'; }
    }

    // --- FUNÇÃO PARA DESCOBRIR A COR DO STATUS ---
    function obterClasseCorStatus(statusTexto) {
        if (!statusTexto) return 'status-padrao';
        
        // Coloca tudo em minúsculas para não haver erros de digitação (ex: PENDENTE, pendente)
        const s = statusTexto.toLowerCase().trim(); 
        
        if (s === 'pendente') return 'status-pendente';
        if (s === 'aguardando aprovação') return 'status-aguardando';
        if (s === 'em cotação') return 'status-cotacao';
        if (s === 'pedido emitido') return 'status-pedido';
        if (s === 'entregue') return 'status-entregue';
        if (s === 'cancelado') return 'status-cancelado';
        
        return 'status-padrao'; // Cor padrão laranja se for um texto diferente
    }

    // --- RENDERIZAÇÃO DOS CARDS EXPANSÍVEIS ---
    function renderizarCards(listaDeRequisicoes) {
        const container = document.getElementById('cardsContainer');
        container.innerHTML = '';

        if (listaDeRequisicoes.length === 0) { container.innerHTML = 'Nenhuma requisição encontrada.'; return; }

        listaDeRequisicoes.forEach(req => {
            const id = req.ID || '--';
            const urgente = req.Urgente || 'Não';
            const unidade = req.Unidade || '--';
            const solicitante = req.Solicitante || '--';
            const prazoFormatado = formatarDataBR(req.Prazo);
            const linkAnexo = req.Anexos;
            
            // Separa os múltiplos anexos por \n ou vírgula e cria botões
            let htmlBotaoAnexo = '';
            if (linkAnexo) {
                const listaLinks = linkAnexo.split(/\r?\n|,/).map(l => l.trim()).filter(l => l.startsWith('http'));
                listaLinks.forEach((link, index) => {
                    const textoBotao = listaLinks.length === 1 ? 'Ver Anexo' : `Anexo ${index + 1}`;
                    htmlBotaoAnexo += `<a href="${link}" target="_blank" class="btn-anexo" onclick="event.stopPropagation();">${textoBotao}</a>`;
                });
            }

            // Constrói as linhas da tabela de itens
            let linhasItensHTML = '';
            if (req.itens && req.itens.length > 0) {
                linhasItensHTML = `<div class="linha-item-header">
                                     <div>Nome do Item</div><div>Qtd</div><div>Comprador</div><div>Status</div><div>Previsão</div>
                                   </div>`;
                req.itens.forEach(item => {
                    linhasItensHTML += `
                        <div class="linha-item">
                            <div data-label="Item">${item.nome}</div>
                            <div data-label="Qtd">${item.qtd}</div>
                            <div data-label="Comprador">${item.comprador}</div>
                            <div data-label="Status"><span class="badge-status ${obterClasseCorStatus(item.status)}">${item.status}</span></div>
                            <div data-label="Previsão">${formatarDataBR(item.previsao)}</div>
                        </div>`;
                });
            } else {
                linhasItensHTML = `<div style="text-align: center; color: #666; padding: 10px;">Sem itens cadastrados nesta requisição.</div>`;
            }

            const cardHTML = `
                <div class="card">
                    <div class="card-header" onclick="toggleCard('${id}')">
                        <h4>Requisição #${id} - Urgente: ${urgente} <span id="chev-${id}" class="chevron">▼</span></h4>
                        <div class="status-line">
                            📋 Contém ${req.itens ? req.itens.length : 0} item(ns) (Clique para expandir detalhes)
                        </div>
                        <div class="footer-line">
                            <span>${unidade} | ${solicitante} | Prazo Geral: ${prazoFormatado}</span>
                            <div>${htmlBotaoAnexo}</div>
                        </div>
                    </div>
                    <div class="card-body" id="body-${id}">
                        <div class="tabela-itens">
                            ${linhasItensHTML}
                        </div>
                    </div>
                </div>
            `;
            container.innerHTML += cardHTML;
        });
    }

    // --- LÓGICA DE PESQUISA AVANÇADA ---
    function filtrarRequisicoes() {
        const termo = document.getElementById('inputPesquisa').value.toLowerCase().trim();
        const filtro = document.getElementById('filtroPesquisa').value;

        if (termo === '') { renderizarCards(todasRequisicoes); return; }

        const listaFiltrada = todasRequisicoes.filter(req => {
            if (filtro === 'id') return String(req.ID).toLowerCase().includes(termo);
            if (filtro === 'unidade') return String(req.Unidade).toLowerCase().includes(termo);
            if (filtro === 'solicitante') return String(req.Solicitante).toLowerCase().includes(termo);
            
            if (filtro === 'todos') {
                let todoConteudo = `${req.ID} ${req.Unidade} ${req.Solicitante} ${req.Urgente} ${formatarDataBR(req.Prazo)}`.toLowerCase();
                if (req.itens) {
                    req.itens.forEach(i => {
                        todoConteudo += ` ${i.nome} ${i.comprador} ${i.status}`;
                    });
                }
                return todoConteudo.toLowerCase().includes(termo);
            }
        });
        renderizarCards(listaFiltrada);
    }

    window.onload = carregarDados;
</script>
