<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="imagens/flavicon.png" type="image/png">
    <title>Solicitação de Compras</title>
    <style>
        /* Tipografia Apple e Fundo com Gradiente Suave Concreluz */
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #d1d1d1; 
            background-image: 
                url("imagens/LogoConcreluz.jpeg"),
                radial-gradient(circle at 10% 10%, rgba(230, 92, 0, 0.432), transparent 40%),
                radial-gradient(ellipse at 50% 50%, rgba(240, 88, 0, 0.452), transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(0, 0, 0, 0.452), transparent 40%);
            background-size: 190px auto, auto, auto, auto;
            background-attachment: fixed;
            background-repeat: no-repeat;
            background-position:bottom;
            margin: 0;
            padding-bottom: 35px;
            padding-top: 15px;
            color: #1d1d1f;
            min-height: 100vh;
        }

        /* Container Principal - O Vidro Fosco (Liquid Glass) */
        .container { 
            max-width: 850px; 
            margin: 0 auto; 
            background: rgba(151, 151, 151, 0.507); 
            backdrop-filter: blur(24px) saturate(180%); 
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            padding: 35px; 
            border-radius: 24px; 
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 40px rgba(0,0,0,0.06); 
        }
        
        h2 {
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-top: 0;
            margin-bottom: 25px;
        }

        /* Navbar estilo Segmented Control da Apple */
        .navbar { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 30px; 
            background: rgba(29, 29, 31, 0.06); 
            padding: 6px; 
            border-radius: 16px; 
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .nav-btn { 
            flex: 1; 
            background: transparent; 
            color: #1d1d1f; 
            border: none; 
            padding: 10px 15px; 
            cursor: pointer; 
            font-size: 15px; 
            font-weight: 600; 
            border-radius: 12px; 
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); 
        }
        .nav-btn:hover { 
            background: rgba(255, 255, 255, 0.5); 
        }
        .nav-btn.active { 
            background: #e65c00; 
            color: white; 
            box-shadow: 0 4px 12px rgba(230, 92, 0, 0.3);
        }

        .escondido { display: none !important; }

        /* Campos de Formulário */
        .form-group { margin-bottom: 20px; }
        label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            color: #1d1d1f; 
            font-size: 14px;
        }
        input, select, textarea { 
            width: 100%; 
            padding: 12px 14px; 
            background: rgba(255, 255, 255, 0.7); 
            border: 1px solid rgba(255, 255, 255, 0.9); 
            border-radius: 14px; 
            font-size: 15px; 
            color: #1d1d1f;
            transition: all 0.3s ease;
            box-shadow: inset 0 1px 4px rgba(0,0,0,0.03);
            font-family: inherit;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #e65c00;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(230, 92, 0, 0.15);
        }

        /* Botão Principal */
        .btn { 
            padding: 14px 20px; 
            background: #e65c00; 
            color: white; 
            border: none; 
            border-radius: 14px; 
            cursor: pointer; 
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(230, 92, 0, 0.25);
        }
        .btn:hover { 
            background: #cc5200; 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(230, 92, 0, 0.35);
        }
        .btn:active {
            transform: translateY(0);
        }
        
        /* Botões de Ação Menores */
        .btn-remover { 
            background: rgba(220, 53, 69, 0.1); 
            color: #dc3545; 
            border: none; 
            padding: 6px 12px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-size: 13px; 
            font-weight: 700; 
            transition: 0.2s;
        }
        .btn-remover:hover { 
            background: #dc3545; 
            color: white; 
        }
        
        .btn-anexo { 
            display: inline-block; 
            background: rgba(0, 89, 179, 0.164); 
            color: #004da0; 
            text-decoration: none; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.171); 
            padding: 6px 12px; 
            border-radius: 10px; 
            font-size: 13px; 
            font-weight: 600; 
            margin-left: 10px; 
            transition: 0.2s;
        }
        .btn-anexo:hover { 
            background: #007bff9d; 
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.61);
            color: white; 
        }

        /* Containers de Itens Aninhados */
        .items-container { 
            background: rgba(255, 255, 255, 0.4); 
            border: 1px solid rgba(255, 255, 255, 0.6); 
            padding: 18px; 
            border-radius: 16px; 
        }
        .item-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .item-list { margin-top: 10px; list-style: none; padding: 0; }
        .item-list li { 
            background: rgba(255, 255, 255, 0.65); 
            padding: 12px 16px; 
            border: 1px solid rgba(255, 255, 255, 0.8); 
            border-radius: 12px; 
            margin-bottom: 8px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }
        
        /* Grid de Cards (Histórico) */
        .cards-grid { display: grid; grid-template-columns: 1fr; gap: 18px; margin-top: 15px; }
        .card { 
            background: rgba(255, 255, 255, 0.062); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8); 
            border-radius: 20px; 
            padding: 22px; 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.384); 
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.815);
        }
        .card h4 { margin: 0 0 10px 0; color: #1d1d1f; font-size: 17px; display: flex; justify-content: space-between; align-items: center;}
        .card .status-line { font-size: 13px; color: #535353; margin-bottom: 15px; font-weight: 500; }
        .card .item-line { font-size: 15px; color: #1d1d1f; margin-bottom: 18px; line-height: 1.4; }
        .card .footer-line { font-size: 13px; color: #1d1d1f; display: flex; justify-content: space-between; align-items: center; font-weight: 500;}
        
        #loading { display: none; margin-top: 15px; color: #e65c00; font-weight: 600; text-align: center; }

        /* Barra de Pesquisa */
        .search-bar { display: flex; gap: 12px; margin-bottom: 25px; }
        @media (max-width: 600px) {
            .search-bar { flex-direction: column; }
        }
    </style>
</head>
<body>

<script>
    const URL_DO_GAS = "https://script.google.com/macros/s/AKfycbyyyVIgc_OHb0M4eHCb34VK3abjYSJWeHmLp_sJpMaZNJdWqQxiEgQqXJ2o1QmTiaMD/exec"; 

    let todasRequisicoes = []; 
    let tempoUltimaBusca = 0; // Variável para o controle da Trava de Tempo (Cache)

    function mostrarTela(telaAlvo) {
        document.getElementById('telaNova').classList.add('escondido');
        document.getElementById('telaLista').classList.add('escondido');
        document.getElementById('btnAbaNova').classList.remove('active');
        document.getElementById('btnAbaLista').classList.remove('active');

        if(telaAlvo === 'nova') {
            document.getElementById('telaNova').classList.remove('escondido');
            document.getElementById('btnAbaNova').classList.add('active');
        } else if (telaAlvo === 'lista') {
            document.getElementById('telaLista').classList.remove('escondido');
            document.getElementById('btnAbaLista').classList.add('active');
            carregarDados(); 
        }
    }

    let itensMapeados = [];

    function adicionarItem() {
        const nome = document.getElementById('nomeItem').value;
        const qtd = document.getElementById('qtdItem').value;
        
        if(nome && qtd) {
            itensMapeados.push({nome: nome, qtd: qtd});
            atualizarListaHTML();
            document.getElementById('nomeItem').value = '';
            document.getElementById('qtdItem').value = '';
            document.getElementById('nomeItem').focus();
        }
    }

    function removerItem(index) {
        itensMapeados.splice(index, 1);
        atualizarListaHTML();
    }

    function atualizarListaHTML() {
        const ul = document.getElementById('listaItensHTML');
        ul.innerHTML = '';
        itensMapeados.forEach((item, index) => {
            ul.innerHTML += `
                <li>
                    <span>${item.nome} <b>(${item.qtd})</b></span>
                    <button type="button" class="btn-remover" onclick="removerItem(${index})" title="Remover item">X</button>
                </li>`;
        });
    }

    document.getElementById('requisicaoForm').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA') {
            e.preventDefault(); 
            if (e.target.id === 'nomeItem' || e.target.id === 'qtdItem') {
                adicionarItem();
            }
        }
    });

    document.getElementById('requisicaoForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        if(itensMapeados.length === 0) {
            alert('Adicione pelo menos um item!');
            return;
        }

        const confirmacao = confirm("Confirma o envio desta requisição?");
        if (!confirmacao) return;

        const btnEnviar = document.getElementById('btnEnviar');
        const divLoading = document.getElementById('loading');
        
        btnEnviar.style.display = 'none';
        divLoading.style.display = 'block';

        const payload = {
            unidade: document.getElementById('unidade').value,
            solicitante: document.getElementById('solicitante').value,
            tipo: document.getElementById('tipo').value,
            grupoMaterial: document.getElementById('grupoMaterial').value,
            itens: itensMapeados,
            prazo: document.getElementById('prazo').value,
            aplicacao: document.getElementById('aplicacao').value,
            justificativa: document.getElementById('justificativa').value,
            urgente: document.getElementById('urgente').value,
            arquivoBase64: null,
            arquivoNome: null,
            arquivoMimeType: null
        };

        const inputArquivo = document.getElementById('arquivoAnexo');
        
        if (inputArquivo.files.length > 0) {
            const file = inputArquivo.files[0];
            
            if (file.size > 5 * 1024 * 1024) {
                alert("O arquivo anexado é maior que 5MB. Por favor, escolha um arquivo menor.");
                btnEnviar.style.display = 'block';
                divLoading.style.display = 'none';
                return;
            }

            payload.arquivoNome = file.name;
            payload.arquivoMimeType = file.type;

            const reader = new FileReader();
            reader.onload = function(eventoBase64) {
                payload.arquivoBase64 = eventoBase64.target.result.split(',')[1];
                enviarParaGAS(payload);
            };
            reader.readAsDataURL(file);
        } else {
            enviarParaGAS(payload);
        }
    });

    async function enviarParaGAS(payload) {
        try {
            const response = await fetch(URL_DO_GAS, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            });

            const result = await response.json();
            
            if(result.status === "success") {
                const numeroReq = result.id ? `#${result.id} ` : '';
                alert(`Requisição ${numeroReq}enviada com sucesso!`);
                
                document.getElementById('requisicaoForm').reset();
                itensMapeados = [];
                atualizarListaHTML();
                
                // TRUE para furar o bloqueio de cache e atualizar a lista com a nova requisição
                await carregarDados(true); 
                mostrarTela('lista'); 
            } else {
                alert(`Atenção: Houve um erro no servidor. ${result.message}`);
            }
        } catch (error) {
            console.error(error);
            alert("Erro de conexão ao enviar a requisição.");
        } finally {
            document.getElementById('btnEnviar').style.display = 'block';
            document.getElementById('loading').style.display = 'none';
        }
    }

    function formatarDataBR(dataStr) {
        if (!dataStr) return '--/--/----';
        let limpo = String(dataStr).split('T')[0]; 
        if (limpo.includes('-')) {
            let partes = limpo.split('-');
            if (partes.length === 3 && partes[0].length === 4) {
                return `${partes[2]}/${partes[1]}/${partes[0]}`;
            }
        }
        return limpo; 
    }

    function obterCampo(obj, nomeCampo) {
        if (!obj) return '';
        const nomeLimpo = nomeCampo.toLowerCase().replace(/[:\s/]/g, '');
        const chaveEncontrada = Object.keys(obj).find(k => 
            k.toLowerCase().replace(/[:\s/]/g, '') === nomeLimpo
        );
        return chaveEncontrada ? obj[chaveEncontrada] : '';
    }

    // Função Atualizada com o Cache Inteligente (Trava de Tempo)
    async function carregarDados(forcarUpdate = false) {
        const agora = Date.now();
        const TEMPO_TRAVA = 30000; // 30 segundos

        if (!forcarUpdate && todasRequisicoes.length > 0 && (agora - tempoUltimaBusca < TEMPO_TRAVA)) {
            console.log("Trava ativa: Carregando dados da memória instantaneamente.");
            renderizarCards(todasRequisicoes);
            return;
        }

        try {
            document.getElementById('cardsContainer').innerHTML = 'Carregando solicitações...';
            
            const response = await fetch(URL_DO_GAS);
            const dados = await response.json(); 
            
            const datalist = document.getElementById('historicoItens');
            datalist.innerHTML = '';
            dados.itensHistorico.forEach(item => {
                const option = document.createElement('option');
                option.value = item;
                datalist.appendChild(option);
            });

            if (dados.requisicoes.length === 0) {
                document.getElementById('cardsContainer').innerHTML = 'Nenhuma requisição encontrada.';
                todasRequisicoes = [];
                return;
            }

            todasRequisicoes = dados.requisicoes.reverse();
            tempoUltimaBusca = Date.now(); // Atualiza o relógio marcando a hora desta busca
            renderizarCards(todasRequisicoes);

        } catch (error) {
            console.error("Erro ao carregar os dados", error);
            document.getElementById('cardsContainer').innerHTML = 'Falha ao carregar os dados. Verifique o console.';
        }
    }

    function renderizarCards(listaDeRequisicoes) {
        const container = document.getElementById('cardsContainer');
        container.innerHTML = '';

        if (listaDeRequisicoes.length === 0) {
            container.innerHTML = 'Nenhuma requisição encontrada para esta pesquisa.';
            return;
        }

        listaDeRequisicoes.forEach(req => {
            const id = obterCampo(req, 'ID');
            const urgente = obterCampo(req, 'Urgente');
            const unidade = obterCampo(req, 'Unidade');
            const solicitante = obterCampo(req, 'Solicitante');
            const itensTexto = obterCampo(req, 'Descrição do item / serviço') || 'Sem itens informados';
            const linkAnexo = obterCampo(req, 'Anexos');
            
            const prazoFormatado = formatarDataBR(obterCampo(req, 'Prazo'));
            const previsao = formatarDataBR(obterCampo(req, 'Previsão'));
            
            const compradorRaw = obterCampo(req, 'Comprador');
            const comprador = compradorRaw && compradorRaw !== '#N/A' && compradorRaw !== '' ? compradorRaw : 'Pendente';
            
            const statusRaw = obterCampo(req, 'Status');
            const status = statusRaw && statusRaw !== '#N/A' && statusRaw !== '' ? statusRaw : 'Aguardando Aprovação';

            let htmlBotaoAnexo = '';
            if (linkAnexo && linkAnexo.startsWith('http')) {
                htmlBotaoAnexo = `<a href="${linkAnexo}" target="_blank" class="btn-anexo" title="Abrir arquivo anexo">Ver Anexo</a>`;
            }

            const cardHTML = `
                <div class="card">
                    <h4>Requisição #${id} - Urgente: ${urgente}</h4>
                    <div class="status-line">${comprador} - ${status} - Previsão/data entrega: ${previsao}</div>
                    <div class="item-line"><b>Itens:</b> ${itensTexto}</div>
                    <div class="footer-line">
                        <span>${unidade} | ${solicitante} | Prazo: ${prazoFormatado}</span>
                        ${htmlBotaoAnexo}
                    </div>
                </div>
            `;
            container.innerHTML += cardHTML;
        });
    }

    function filtrarRequisicoes() {
        const termo = document.getElementById('inputPesquisa').value.toLowerCase().trim();
        const filtroSelecionado = document.getElementById('filtroPesquisa').value;

        if (termo === '') {
            renderizarCards(todasRequisicoes);
            return;
        }

        const listaFiltrada = todasRequisicoes.filter(req => {
            const id = obterCampo(req, 'ID');
            const comprador = (obterCampo(req, 'Comprador') && obterCampo(req, 'Comprador') !== '#N/A') ? obterCampo(req, 'Comprador') : 'Pendente';
            const solicitante = obterCampo(req, 'Solicitante');
            const unidade = obterCampo(req, 'Unidade');
            const prazoFormatado = formatarDataBR(obterCampo(req, 'Prazo'));

            if (filtroSelecionado === 'id') return String(id).toLowerCase().includes(termo);
            if (filtroSelecionado === 'comprador') return String(comprador).toLowerCase().includes(termo);
            if (filtroSelecionado === 'solicitante') return String(solicitante).toLowerCase().includes(termo);
            if (filtroSelecionado === 'unidade') return String(unidade).toLowerCase().includes(termo);
            if (filtroSelecionado === 'prazo') return String(prazoFormatado).toLowerCase().includes(termo);
            
            if (filtroSelecionado === 'todos') {
                const urgente = obterCampo(req, 'Urgente');
                const status = (obterCampo(req, 'Status') && obterCampo(req, 'Status') !== '#N/A') ? obterCampo(req, 'Status') : 'Aguardando Aprovação';
                const previsao = formatarDataBR(obterCampo(req, 'Previsão'));
                const itensTexto = obterCampo(req, 'Descrição do item / serviço');

                const todoConteudo = `${id} ${comprador} ${solicitante} ${unidade} ${prazoFormatado} ${urgente} ${status} ${previsao} ${itensTexto}`.toLowerCase();
                return todoConteudo.includes(termo);
            }
        });

        renderizarCards(listaFiltrada);
    }

    window.onload = carregarDados;
</script>

</body>
</html>
